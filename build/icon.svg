<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B6CFF"></stop>
      <stop offset="1" stop-color="#3B4BD8"></stop>
    </linearGradient>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"></rect>
    </clipPath>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"></feGaussianBlur>
      <feOffset dx="0" dy="18"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"></rect>

    <g filter="url(#paperShadow)">
      
      <g transform="rotate(-8 512 512)">
        <rect x="240" y="200" width="500" height="640" rx="42" fill="rgba(255,255,255,0.62)"></rect>
      </g>
      
      <g transform="rotate(4 512 512)">
        <rect x="280" y="220" width="500" height="640" rx="42" fill="#ffffff"></rect>
      </g>
    </g>

    
    <g transform="rotate(4 512 512)" stroke="#C9D0FF" stroke-width="22" stroke-linecap="round">
      <line x1="340" y1="380" x2="720" y2="380"></line>
      <line x1="340" y1="470" x2="680" y2="470"></line>
      <line x1="340" y1="560" x2="640" y2="560"></line>
      <line x1="340" y1="650" x2="600" y2="650"></line>
      <line x1="340" y1="740" x2="520" y2="740"></line>
    </g>
  </g>
</svg>